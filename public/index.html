<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escuchar en vivo</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }
  button {
    font-size: 1.4rem;
    padding: 1rem 2.5rem;
    border-radius: 50px;
    border: none;
    background: #2ecc71;
    color: #111;
    cursor: pointer;
  }
  button:disabled { background: #555; color: #999; cursor: default; }
  #status { margin-top: 1.5rem; color: #aaa; }
  .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #555;
    margin-right: 6px;
  }
  .dot.live { background: #2ecc71; }
</style>
</head>
<body>
  <h1>🎙️ Voz en vivo</h1>
  <button id="startBtn">▶ Escuchar</button>
  <p id="status"><span class="dot" id="dot"></span><span id="statusText">Desconectado</span></p>

<script>
const SAMPLE_RATE = 16000;
const BUFFER_DELAY = 0.25; // colchón de ~250ms para absorber jitter de red

let audioCtx;
let ws;
let nextStartTime = 0;

const startBtn = document.getElementById("startBtn");
const statusText = document.getElementById("statusText");
const dot = document.getElementById("dot");

startBtn.addEventListener("click", async () => {
  startBtn.disabled = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  await audioCtx.resume();
  connect();
});

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/listen`);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    statusText.textContent = "Conectado, esperando audio...";
    dot.classList.add("live");
    nextStartTime = audioCtx.currentTime + BUFFER_DELAY;
  };

  ws.onclose = () => {
    statusText.textContent = "Desconectado, reintentando...";
    dot.classList.remove("live");
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (event) => {
    const int16 = new Int16Array(event.data);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
      float32[i] = int16[i] / 32768;
    }

    const buffer = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
    buffer.copyToChannel(float32, 0);

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    if (nextStartTime < now) {
      // Nos atrasamos demasiado (hubo un corte grande): recuperamos
      nextStartTime = now + 0.05;
    }
    source.start(nextStartTime);
    nextStartTime += buffer.duration;

    statusText.textContent = "🔴 En vivo";
  };
}
</script>
</body>
</html>
