<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escuchar en vivo</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }
  button {
    font-size: 1.4rem;
    padding: 1rem 2.5rem;
    border-radius: 50px;
    border: none;
    background: #2ecc71;
    color: #111;
    cursor: pointer;
  }
  button:disabled { background: #555; color: #999; cursor: default; }
  #status { margin-top: 1.5rem; color: #aaa; }
  .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #555;
    margin-right: 6px;
  }
  .dot.live { background: #2ecc71; }

  .modes {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.5rem;
  }
  .modes button {
    font-size: 0.9rem;
    padding: 0.5rem 1.2rem;
    background: #222;
    color: #ccc;
    border: 1px solid #444;
  }
  .modes button.active {
    background: #2ecc71;
    color: #111;
    border-color: #2ecc71;
  }

  canvas {
    display: none;
    margin-top: 1.5rem;
    background: #000;
    border-radius: 8px;
    border: 1px solid #333;
  }
  canvas.visible { display: block; }
</style>
</head>
<body>
  <h1>🎙️ Voz en vivo</h1>
  <button id="startBtn">▶ Escuchar</button>
  <p id="status"><span class="dot" id="dot"></span><span id="statusText">Desconectado</span></p>

  <div class="modes">
    <button id="modeOsc" class="active">Osciloscopio</button>
    <button id="modeSpec">Espectro</button>
    <button id="modeSpectrogram">Espectrograma</button>
  </div>

  <canvas id="canvasOsc" width="600" height="200" class="visible"></canvas>
  <canvas id="canvasSpec" width="600" height="200"></canvas>
  <canvas id="canvasSpectrogram" width="600" height="200"></canvas>

<script>
const SAMPLE_RATE = 48000;
const BUFFER_DELAY = 0.6; // colchón de ~600ms para absorber jitter de red (48kHz necesita más margen)
const MAX_FREQ = 20000; // límite superior para espectro y espectrograma
const MIN_FREQ = 20; // límite inferior de frecuencia mostrada
const SPECTROGRAM_SCROLL_MS = 150; // cada cuántos ms avanza una columna el espectrograma (más alto = más lento)

let audioCtx;
let ws;
let nextStartTime = 0;
let analyser;
let currentMode = "osc";
let lastSpectrogramShift = 0;

const startBtn = document.getElementById("startBtn");
const statusText = document.getElementById("statusText");
const dot = document.getElementById("dot");

const canvasOsc = document.getElementById("canvasOsc");
const canvasSpec = document.getElementById("canvasSpec");
const canvasSpectrogram = document.getElementById("canvasSpectrogram");
const ctxOsc = canvasOsc.getContext("2d");
const ctxSpec = canvasSpec.getContext("2d");
const ctxSpectrogram = canvasSpectrogram.getContext("2d");

document.getElementById("modeOsc").addEventListener("click", () => setMode("osc"));
document.getElementById("modeSpec").addEventListener("click", () => setMode("spec"));
document.getElementById("modeSpectrogram").addEventListener("click", () => setMode("spectrogram"));

function setMode(mode) {
  currentMode = mode;
  document.getElementById("modeOsc").classList.toggle("active", mode === "osc");
  document.getElementById("modeSpec").classList.toggle("active", mode === "spec");
  document.getElementById("modeSpectrogram").classList.toggle("active", mode === "spectrogram");
  canvasOsc.classList.toggle("visible", mode === "osc");
  canvasSpec.classList.toggle("visible", mode === "spec");
  canvasSpectrogram.classList.toggle("visible", mode === "spectrogram");
}

startBtn.addEventListener("click", async () => {
  startBtn.disabled = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  await audioCtx.resume();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.6;

  connect();
  requestAnimationFrame(drawLoop);
});

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/listen`);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    statusText.textContent = "Conectado, esperando audio...";
    dot.classList.add("live");
    nextStartTime = audioCtx.currentTime + BUFFER_DELAY;
  };

  ws.onclose = () => {
    statusText.textContent = "Desconectado, reintentando...";
    dot.classList.remove("live");
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (event) => {
    const int16 = new Int16Array(event.data);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
      float32[i] = int16[i] / 32768;
    }

    const buffer = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
    buffer.copyToChannel(float32, 0);

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.connect(analyser);

    const now = audioCtx.currentTime;
    if (nextStartTime < now) {
      // Nos atrasamos demasiado (hubo un corte grande): recuperamos
      nextStartTime = now + 0.05;
    }
    source.start(nextStartTime);
    nextStartTime += buffer.duration;

    statusText.textContent = "🔴 En vivo";
  };
}

// ---------- Visualizaciones ----------

function drawLoop() {
  if (analyser) {
    if (currentMode === "osc") drawOscilloscope();
    else if (currentMode === "spec") drawSpectrum();
    else if (currentMode === "spectrogram") drawSpectrogram();
  }
  requestAnimationFrame(drawLoop);
}

function drawOscilloscope() {
  const bufferLength = analyser.fftSize;
  const dataArray = new Uint8Array(bufferLength);
  analyser.getByteTimeDomainData(dataArray);

  const w = canvasOsc.width, h = canvasOsc.height;
  ctxOsc.fillStyle = "#000";
  ctxOsc.fillRect(0, 0, w, h);
  ctxOsc.lineWidth = 2;
  ctxOsc.strokeStyle = "#2ecc71";
  ctxOsc.beginPath();

  const sliceWidth = w / bufferLength;
  let x = 0;
  for (let i = 0; i < bufferLength; i++) {
    const v = dataArray[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctxOsc.moveTo(x, y);
    else ctxOsc.lineTo(x, y);
    x += sliceWidth;
  }
  ctxOsc.stroke();
}

// Calcula cuántos bins de la FFT entran hasta MAX_FREQ
function getMaxBin(bufferLength) {
  const freqPerBin = audioCtx.sampleRate / analyser.fftSize;
  return Math.max(1, Math.min(bufferLength, Math.ceil(MAX_FREQ / freqPerBin)));
}

function drawSpectrum() {
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  analyser.getByteFrequencyData(dataArray);

  const maxBin = getMaxBin(bufferLength); // solo bins hasta 20kHz

  const w = canvasSpec.width, h = canvasSpec.height;
  ctxSpec.fillStyle = "#000";
  ctxSpec.fillRect(0, 0, w, h);

  const barCount = 64; // agrupamos bins para que se vea prolijo
  const binsPerBar = Math.max(1, Math.floor(maxBin / barCount));
  const barWidth = w / barCount;

  for (let i = 0; i < barCount; i++) {
    let sum = 0;
    let count = 0;
    for (let j = 0; j < binsPerBar; j++) {
      const idx = i * binsPerBar + j;
      if (idx < maxBin) {
        sum += dataArray[idx];
        count++;
      }
    }
    const avg = count ? sum / count : 0;
    const barHeight = (avg / 255) * h;

    const hue = 140 - (avg / 255) * 140; // verde (bajo) a rojo (alto)
    ctxSpec.fillStyle = `hsl(${hue}, 90%, 50%)`;
    ctxSpec.fillRect(i * barWidth, h - barHeight, barWidth - 2, barHeight);
  }
}

function drawSpectrogram() {
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  analyser.getByteFrequencyData(dataArray);

  const maxBin = getMaxBin(bufferLength); // solo bins hasta 20kHz
  const freqPerBin = audioCtx.sampleRate / analyser.fftSize;

  const w = canvasSpectrogram.width, h = canvasSpectrogram.height;

  // Solo avanzamos una columna cada SPECTROGRAM_SCROLL_MS, para que se mueva más despacio
  const now = performance.now();
  if (now - lastSpectrogramShift < SPECTROGRAM_SCROLL_MS) return;
  lastSpectrogramShift = now;

  // Desplazamos todo el contenido 1px a la izquierda
  const imageData = ctxSpectrogram.getImageData(1, 0, w - 1, h);
  ctxSpectrogram.putImageData(imageData, 0, 0);

  // Dibujamos una columna nueva en el borde derecho, con escala lineal en frecuencia
  for (let y = 0; y < h; y++) {
    // y=0 (arriba) -> MAX_FREQ, y=h-1 (abajo) -> MIN_FREQ
    const frac = 1 - y / h;
    const freq = MIN_FREQ + frac * (MAX_FREQ - MIN_FREQ);
    let binIndex = Math.round(freq / freqPerBin);
    binIndex = Math.max(0, Math.min(binIndex, maxBin - 1));
    const value = dataArray[binIndex];
    const hue = 240 - (value / 255) * 240; // azul (silencio) a rojo (fuerte)
    const lightness = 5 + (value / 255) * 45;
    ctxSpectrogram.fillStyle = `hsl(${hue}, 100%, ${lightness}%)`;
    ctxSpectrogram.fillRect(w - 1, y, 1, 1);
  }
}
</script>
</body>
</html>
